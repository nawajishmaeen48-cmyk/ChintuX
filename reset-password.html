<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Paw n Furr</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FAF8F4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .paw { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1A237E;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #6C757D;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #47C1B1;
      color: white;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 32px;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .store {
      font-size: 13px;
      color: #A0A0A0;
      margin-top: 8px;
    }
    .store a { color: #47C1B1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="paw">🐾</div>
    <h1>Opening Paw n Furr…</h1>
    <p id="msg">Redirecting you to the app to reset your password.</p>
    <a id="applink" class="btn" href="#">Open in App</a>
    <div class="store">
      App not installed?
      <a href="https://apps.apple.com/app/paw-n-furr/id000000000">Download on the App Store</a>
    </div>
  </div>

  <script>
    // Grab the full fragment from Supabase (e.g. #access_token=...&type=recovery)
    // Supabase also supports PKCE with ?code= param
    var fragment = window.location.hash || "";
    var search   = window.location.search || "";
    var deepLink = "pawnfurr://reset-password" + fragment + (search ? (fragment ? "&" + search.slice(1) : search) : "");

    // Update the manual fallback button
    document.getElementById("applink").href = deepLink;

    // Auto-redirect immediately
    window.location.replace(deepLink);

    // If the browser doesn't follow the redirect (desktop / app not installed),
    // update the message after 2 seconds
    setTimeout(function () {
      document.getElementById("msg").textContent =
        "Couldn't open the app automatically. Tap the button below, or download Paw n Furr from the App Store.";
    }, 2000);
  </script>
</body>
</html>
