name: PawBuddyCare
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.5.0

targets:
  PawBuddyCare:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - "Info.plist"
          - "project.yml"
          - "Pawly.xcodeproj"
          - "PawlyTests"
          - "supabase_schema.sql"
          - "supabase_schema_anonymous.sql"
    resources:
      - path: Assets.xcassets
    dependencies:
      - package: supabase-swift
        product: Supabase
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Paw Buddy Care
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: BrandCream
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSUserNotificationsUsageDescription: "Paw Buddy Care uses notifications to remind you about your pet's meals, medications, and checkups."
        NSCameraUsageDescription: "Paw Buddy Care uses the camera to capture photos of your pet and their prescriptions or vaccine cards."
        NSPhotoLibraryUsageDescription: "Paw Buddy Care accesses your photo library so you can set a photo for your pet and attach prescription images."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.pawbuddycare
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist

  PawBuddyCareTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PawlyTests
    dependencies:
      - target: PawBuddyCare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.pawbuddycare.tests
        GENERATE_INFOPLIST_FILE: YES
